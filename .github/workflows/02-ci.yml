# This is the first real CI workflow in the course.
# It verifies a change by running tests, building a Docker image,
# scanning it with Trivy, and publishing it as an artifact.
name: 02 CI Workflow

on:
  # Run automatically when app code, tests, or this workflow file changes.
  push:
    paths:
      - "app/**"
      - "tests/**"
      - ".github/workflows/02-ci.yml"
      - "Dockerfile"

  # Allow a safe manual run before students trigger it with a code change.
  workflow_dispatch:

  # Run every 5 minutes for demonstration purposes.
  schedule:
    - cron: "*/5 * * * *"

env:
  IMAGE_NAME: tiny-health-app
  IMAGE_TAR: tiny-health-app.tar

jobs:
  run-tests:
    # The runner is the temporary machine that executes the steps below.
    runs-on: ${{ matrix.os }}

    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest]
        python-version: ["3.11", "3.12"]

    steps:
      # Download the repository onto the runner.
      - name: Check out repository
        uses: actions/checkout@v6

      # Install the requested Python version.
      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}

      # Install Ruff.
      - name: Install Ruff
        run: |
          python -m pip install --upgrade pip
          pip install ruff

      # Lint the project.
      - name: Lint with Ruff
        run: |
          ruff check .

      # Scan the repository filesystem.
      - name: Run Trivy Filesystem Scan
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: fs
          scan-ref: .
          format: table
          exit-code: 1
          severity: CRITICAL

      # Scan the Dockerfile for misconfigurations.
      - name: Run Trivy Dockerfile Scan
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: config
          scan-ref: Dockerfile
          format: table
          exit-code: 1
          severity: CRITICAL

      # Execute unit tests.
      - name: Run Tests
        run: python -m unittest discover -s tests -v

      # Display some runner information.
      - name: Check Time, List Files and Verify Python
        run: |
          echo "=== Checking Runner System Time (UTC) ==="
          date

          echo "=== Checking Python Version ==="
          python --version

          echo "=== Listing Repository Files ==="
          ls -la

      # Buildx is only available on Linux.
      - name: Set up Docker Buildx
        if: matrix.os == 'ubuntu-latest'
        uses: docker/setup-buildx-action@v3

      # Build the Docker image.
      - name: Build Docker Image
        if: matrix.os == 'ubuntu-latest'
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile
          tags: ${{ env.IMAGE_NAME }}:latest
          load: true

      # Scan the built image for vulnerabilities.
      - name: Run Trivy Image Scan
        if: matrix.os == 'ubuntu-latest'
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ env.IMAGE_NAME }}:latest
          format: table
          exit-code: 1
          severity: CRITICAL

      # Save the Docker image as a tar archive.
      - name: Save Docker Image
        if: matrix.os == 'ubuntu-latest'
        run: |
          docker save ${{ env.IMAGE_NAME }}:latest -o ${{ env.IMAGE_TAR }}

      # # Upload the Docker image as a workflow artifact.
      # - name: Upload Docker Image Artifact
      #   if: matrix.os == 'ubuntu-latest'
      #   uses: actions/upload-artifact@v4
      #   with:
      #     name: docker-image-${{ matrix.python-version }}
      #     path: ${{ env.IMAGE_TAR }}
      #     retention-days: 7