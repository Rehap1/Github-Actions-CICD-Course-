# This is the first real CI workflow in the course.
# It verifies the code, builds a Docker image,
# scans it, runs the container, and publishes the image artifact.
name: 02 CI Workflow

on:
  push:
    paths:
      - "app/**"
      - "tests/**"
      - ".github/workflows/02-ci.yml"
      - "Dockerfile"

  workflow_dispatch:

  schedule:
    - cron: "*/5 * * * *"

env:
  IMAGE_NAME: tiny-health-app
  IMAGE_TAR: tiny-health-app.tar
  CONTAINER_NAME: tiny-health-app

jobs:
  run-tests:
    runs-on: ${{ matrix.os }}

    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest]
        python-version: ["3.11", "3.12"]

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install Ruff
        run: |
          python -m pip install --upgrade pip
          pip install ruff

      - name: Lint with Ruff
        run: ruff check .

      - name: Run Trivy Filesystem Scan
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: fs
          scan-ref: .
          format: table
          exit-code: 1
          severity: CRITICAL

      - name: Run Trivy Dockerfile Scan
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: config
          scan-ref: Dockerfile
          format: table
          exit-code: 1
          severity: CRITICAL

      - name: Run Tests
        run: python -m unittest discover -s tests -v

      - name: Check Runner Information
        run: |
          date
          python --version
          ls -la

      ####################################################################
      # Docker (Ubuntu only)
      ####################################################################

      - name: Build Docker Image
        if: matrix.os == 'ubuntu-latest'
        run: |
          docker build \
            -t ${{ env.IMAGE_NAME }}:latest \
            .

      - name: Scan Docker Image
        if: matrix.os == 'ubuntu-latest'
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ env.IMAGE_NAME }}:latest
          format: table
          output: trivy-report.txt
          exit-code: "0"
          ignore-unfixed: true
          severity: HIGH

      - name: Run Docker Container
        if: matrix.os == 'ubuntu-latest'
        run: |
          docker run -d \
            --name ${{ env.CONTAINER_NAME }} \
            -p 8000:8000 \
            ${{ env.IMAGE_NAME }}:latest

      - name: Wait for Container
        if: matrix.os == 'ubuntu-latest'
        run: sleep 10

      - name: Verify Running Containers
        if: matrix.os == 'ubuntu-latest'
        run: docker ps

      - name: Check Container Logs
        if: failure() && matrix.os == 'ubuntu-latest'
        run: docker logs ${{ env.CONTAINER_NAME }}

      - name: Save Docker Image
        if: matrix.os == 'ubuntu-latest'
        run: |
          docker save \
            ${{ env.IMAGE_NAME }}:latest \
            -o ${{ env.IMAGE_TAR }}

      - name: Stop and Remove Container
        if: always() && matrix.os == 'ubuntu-latest'
        run: |
          docker stop ${{ env.CONTAINER_NAME }} || true
          docker rm ${{ env.CONTAINER_NAME }} || true

      - name: Upload Docker Image Artifact
        if: matrix.os == 'ubuntu-latest'
        uses: actions/upload-artifact@v4
        with:
          name: docker-image-${{ matrix.python-version }}
          path: |
            ${{ env.IMAGE_TAR }}
            trivy-report.txt
          retention-days: 7