# This is the first real CI workflow in the course.
# It verifies a change by running tests on a fresh runner.
name: 02 CI Workflow

on:
  # Run automatically when app code, tests, or this workflow file changes.
  push:
    paths:
      - "app/**"
      - "tests/**"
      - ".github/workflows/02-ci.yml"
      - "Dockerfile"
  # Allow a safe manual run before students trigger it with a code change.
  workflow_dispatch:
  
  schedule:
    - cron: "*/5 * * * *"   

jobs:
  run-tests:
    # The runner is the temporary machine that executes the steps below.
    runs-on: ${{ matrix.os }}

    # env:
    #   PYTHON_VERSION: ${{ secrets.PYTHON_VERSION }}

    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest]
        python-version: ["3.11", "3.12"]

    steps:
      - name: Check out repository
        # Download the repository contents onto the runner.
        uses: actions/checkout@v6

      - name: Set up Python
        # Prepare Python on the runner. This does not change the student laptop.
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install Ruff
        run: |
          python -m pip install --upgrade pip
          pip install ruff

      - name: Lint with Ruff
        run: |
          ruff check .

      # Trivy Filesystem Scan
      - name: Run Trivy Filesystem
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: fs
          scan-ref: .
          format: table
          exit-code: 1
          severity: CRITICAL


      # Trivy Dockerfile Scan
      - name: Run Trivy Dockerfile
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: config
          scan-ref: "Dockerfile"
          format: table
          exit-code: 1
          severity: CRITICAL

      - name: Run tests
        # This is the key verification step in the CI workflow.
        run: python -m unittest discover -s tests -v

      - name: Check Time, List Files and Verify Python
        run: |
          echo "=== Checking Runner System Time (UTC) ==="
          date
        
          echo "=== Checking Python Version ==="
          python --version
        
          echo "=== Listing Repository Files ==="
          ls -la
