# This is the first real CI workflow in the course.
# It verifies a change by running tests, building a Docker image,
# scanning it with Trivy, and publishing it as an artifact.
name: 02 CI Workflow

on:
  push:
    paths:
      - "app/**"
      - "tests/**"
      - ".github/workflows/02-ci.yml"
      - "Dockerfile"

  workflow_dispatch:

  schedule:
    - cron: "*/5 * * * *"

env:
  IMAGE_NAME: tiny-health-app
  IMAGE_TAR: tiny-health-app.tar

jobs:
  run-tests:
    runs-on: ${{ matrix.os }}

    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest]
        python-version: ["3.11", "3.12"]

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install Ruff
        run: |
          python -m pip install --upgrade pip
          pip install ruff

      - name: Lint with Ruff
        run: ruff check .

      - name: Run Trivy Filesystem Scan
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: fs
          scan-ref: .
          format: table
          exit-code: "1"
          severity: CRITICAL

      - name: Run Trivy Dockerfile Scan
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: config
          scan-ref: Dockerfile
          format: table
          exit-code: "1"
          severity: CRITICAL

      - name: Run Tests
        run: python -m unittest discover -s tests -v

      - name: Check Time, List Files and Verify Python
        run: |
          echo "=== Checking Runner System Time (UTC) ==="
          date

          echo "=== Checking Python Version ==="
          python --version

          echo "=== Listing Repository Files ==="
          ls -la

      ####################################################################
      # Docker steps (Ubuntu only)
      ####################################################################

      - name: Set up Docker Buildx
        if: matrix.os == 'ubuntu-latest'
        uses: docker/setup-buildx-action@v3

      - name: Build Docker Image
        if: matrix.os == 'ubuntu-latest'
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile
          tags: ${{ env.IMAGE_NAME }}:latest
          load: true

      - name: Scan Docker Image with Trivy
        if: matrix.os == 'ubuntu-latest'
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ env.IMAGE_NAME }}:latest
          format: table
          output: trivy-report.txt
          exit-code: "0"
          ignore-unfixed: true
          severity: HIGH

      - name: Save Docker Image
        if: matrix.os == 'ubuntu-latest'
        run: |
          docker save ${{ env.IMAGE_NAME }}:latest -o ${{ env.IMAGE_TAR }}

      - name: Upload Docker Image Artifact
        if: matrix.os == 'ubuntu-latest'
        uses: actions/upload-artifact@v4
        with:
          name: docker-image-${{ matrix.python-version }}
          path: |
            ${{ env.IMAGE_TAR }}
            trivy-report.txt
          retention-days: 7