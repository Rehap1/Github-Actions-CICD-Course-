# This first workflow is intentionally tiny.
# It helps students see what a GitHub Actions run looks like.
name: 01 Hello Workflow

on:
  # Run automatically when a PR to main is closed.
  pull_request:
    branches:
      - main
    types:
      - closed

  # Allow running manually.
  workflow_dispatch:

jobs:
  say-hello:
    runs-on: ubuntu-latest

    # Only run automatically if the PR was merged.
    if: github.event_name == 'workflow_dispatch' || github.event.pull_request.merged == true

    steps:
      - name: Say hello
        run: echo "Hello from GitHub Actions and from Rehabb"