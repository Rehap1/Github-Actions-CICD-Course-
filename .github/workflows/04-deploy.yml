# This workflow deploys the application after a pull request is merged.
name: 04 Deploy Workflow

on:
  pull_request:
    types:
      - closed

env:
  IMAGE_NAME: tiny-health-app
  CONTAINER_NAME: tiny-health-container
  APP_PORT: "8000"

permissions:
  contents: read

jobs:
  deploy-package:
    # Run only if the pull request was merged.
    if: github.event.pull_request.merged == true

    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile
          tags: ${{ env.IMAGE_NAME }}:latest
          load: true

      - name: Show Docker images
        run: docker images

      - name: Start container
        run: |
          docker run -d \
            --name "${CONTAINER_NAME}" \
            -p "${APP_PORT}:8000" \
            "${IMAGE_NAME}:latest"

      - name: Smoke test deployed app
        run: |
          for attempt in 1 2 3 4 5; do
            if curl --fail --silent "http://127.0.0.1:${APP_PORT}/health"; then
              echo "Application is healthy."
              exit 0
            fi

            echo "Waiting for app to become ready..."
            sleep 2
          done

          echo "Application failed health check."
          exit 1

      - name: Show container logs
        if: failure()
        run: docker logs "${CONTAINER_NAME}"

      - name: Stop container
        if: always()
        run: docker rm -f "${CONTAINER_NAME}" || true